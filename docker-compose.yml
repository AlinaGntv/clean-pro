services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./data/clean-web.db
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://polza.ai/api/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-deepseek/deepseek-v4-flash}
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  db-data:
